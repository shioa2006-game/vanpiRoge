// ===================== MAP GENERATION =====================
function genMap(){
  const tiles=Array.from({length:MH},()=>Array(MW).fill(0)),rooms=[];
  for(let i=0;i<28;i++){
    const w=rr(5,10),h=rr(4,8),x=rr(1,MW-w-1),y=rr(1,MH-h-1);
    if(rooms.some(r=>x<r.x+r.w+1&&x+w>r.x-1&&y<r.y+r.h+1&&y+h>r.y-1))continue;
    rooms.push({x,y,w,h});
    for(let ry=y;ry<y+h;ry++)for(let rx=x;rx<x+w;rx++)tiles[ry][rx]=1;
  }
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    const ax=a.x+Math.floor(a.w/2),ay=a.y+Math.floor(a.h/2);
    const bx=b.x+Math.floor(b.w/2),by=b.y+Math.floor(b.h/2);
    const cH=(x1,x2,y)=>{for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++)if(y>=0&&y<MH&&x>=0&&x<MW)tiles[y][x]=1};
    const cV=(y1,y2,x)=>{for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++)if(y>=0&&y<MH&&x>=0&&x<MW)tiles[y][x]=1};
    if(Math.random()<0.5){cH(ax,bx,ay);cV(ay,by,bx)}else{cV(ay,by,ax);cH(ax,bx,by)}
  }
  const lr=rooms[rooms.length-1];
  const sx=lr.x+Math.floor(lr.w/2),sy=lr.y+Math.floor(lr.h/2);
  tiles[sy][sx]=2;let cx=-1,cy=-1;
  if(rooms.length>2){const r=rooms[1+rn(rooms.length-2)];cx=r.x+rn(r.w);cy=r.y+rn(r.h);if(tiles[cy][cx]===1)tiles[cy][cx]=3}
  return{tiles,rooms,sx,sy,cx,cy,co:false};
}

function wk(map,x,y){return x>=0&&y>=0&&x<MW&&y<MH&&map.tiles[y][x]!==0}
function fe(s,x,y){return s.en.find(e=>e.x===x&&e.y===y&&e.hp>0)||null}

// ===================== SPAWN =====================
function spawnEn(s){
  const m=s.map,p=s.p,fl=s.fl;
  const pool=fl<=2?['slime','slime','goblin','goblin','archer']:['goblin','archer','mage','mage','goblin'];
  const cnt=5+fl*3;
  for(const room of m.rooms.slice(1)){
    if(s.en.length>=cnt)break;
    const n=rr(1,2+fl);
    for(let i=0;i<n&&s.en.length<cnt;i++){
      const ex=room.x+rn(room.w),ey=room.y+rn(room.h);
      if(m.tiles[ey][ex]!==1||fe(s,ex,ey)||(ex===p.x&&ey===p.y))continue;
      mkEn(s,fl>=2&&Math.random()<0.12?'troll':ch(pool),ex,ey,fl);
    }
  }
}

function mkEn(s,tid,x,y,fl){
  const d=EN[tid],sc=1+(fl-1)*0.18;
  s.en.push({id:`e${++_eid}`,tid,name:d.name,sym:d.sym,col:d.col,
    x,y,hp:Math.floor(d.hp*sc),mhp:Math.floor(d.hp*sc),
    atk:Math.floor(d.atk*sc),def:d.def,spd:d.spd,ai:d.ai,
    rng:d.rng||1,xp:d.xp,g:d.g,elite:d.elite||false,
    chs:d.chs||0,cht:0,chtg:null,fr:0,stun:0,po:0});
}

function spawnBoss(s,bid){
  const d=BOSS[bid],lr=s.map.rooms[s.map.rooms.length-1];
  const bx=lr.x+Math.floor(lr.w/2),by=lr.y+Math.floor(lr.h/4);
  const boss={id:'boss',tid:bid,name:d.name,sym:d.sym,col:d.col,
    x:bx,y:by,hp:d.hp,mhp:d.hp,atk:d.atk,def:d.def,spd:d.spd,
    ai:'boss',rng:1,xp:d.xp,g:d.g,elite:false,
    ph:d.ph,phi:0,fr:0,stun:0,po:0};
  s.en.push(boss);s.boss=boss;
}

// ===================== EQUIPMENT HELPERS =====================
function gef(p,k,dv=0){let v=dv;for(const sl of['weapon','armor','acc1','acc2']){const id=p.eq[sl];if(!id)continue;const it=EQ.find(e=>e.id===id);if(it?.ef&&k in it.ef)v+=it.ef[k]}return v}
function hef(p,k){for(const sl of['weapon','armor','acc1','acc2']){const id=p.eq[sl];if(!id)continue;const it=EQ.find(e=>e.id===id);if(it?.ef&&k in it.ef)return true}return false}

// ===================== COMBAT =====================
function hte(s,e,raw){
  const p=s.p;let dmg=Math.max(1,raw-(e.def||0));
  // Crit
  const cc=0.05+gef(p,'crb');const crit=Math.random()<cc;
  if(crit){dmg*=2;if(hef(p,'cth'))for(const ne of s.en.filter(n=>n.hp>0&&n!==e&&d4(e.x,e.y,n.x,n.y)<=2))dmgE(s,ne,Math.floor(p.atk*0.4))}
  // Buffs
  if(hef(p,'pox2')&&e.po>0)dmg=Math.floor(dmg*2);
  const cry=p.bf.find(b=>b.id==='cry');if(cry)dmg=Math.floor(dmg*cry.am);
  // Low HP def buff
  if(hef(p,'lhd')){const r=1-p.hp/p.mhp;dmg=Math.max(1,dmg-Math.floor(r*18))}
  e.hp=Math.max(0,e.hp-dmg);
  s.pt.push({t:'n',x:e.x,y:e.y,v:dmg,crit,life:20,l0:20,col:crit?COL.ty:COL.tr});
  if(e.hp<=0)die(s,e);
  return dmg;
}

function dmgE(s,e,v){const dmg=Math.max(1,v-(e.def||0));e.hp=Math.max(0,e.hp-dmg);s.pt.push({t:'n',x:e.x,y:e.y,v:dmg,life:18,l0:18,col:COL.tr});if(e.hp<=0)die(s,e)}

function dpg(s,raw,src){
  const p=s.p;let dmg=Math.max(1,raw-p.def);
  const ms=p.bf.find(b=>b.id==='ms');if(ms)dmg=Math.floor(dmg*(1-ms.r));
  const ctr=p.bf.find(b=>b.id==='ctr');
  if(ctr){const ne=s.en.filter(e=>e.hp>0).sort((a,b)=>d4(p.x,p.y,a.x,a.y)-d4(p.x,p.y,b.x,b.y))[0];
    if(ne)dmgE(s,ne,Math.floor(dmg*ctr.m));p.bf=p.bf.filter(b=>b!==ctr);dmg=Math.floor(dmg*0.3)}
  if(hef(p,'lst')&&!p._ls&&p.hp-dmg<=0){p._ls=true;dmg=p.hp-1;lg(s,'ラストスタンド!',COL.ty)}
  const iron=p.bf.find(b=>b.id==='iron');
  if(iron&&iron.rf>0){const ne=s.en.filter(e=>e.hp>0).sort((a,b)=>d4(p.x,p.y,a.x,a.y)-d4(p.x,p.y,b.x,b.y))[0];if(ne)dmgE(s,ne,Math.floor(dmg*iron.rf))}
  p.hp=Math.max(0,p.hp-dmg);
  s.pt.push({t:'n',x:p.x,y:p.y,v:dmg,life:20,l0:20,col:COL.tr,ep:true});
  lg(s,`${src}から${dmg}ダメ`,COL.tr);
  if(p.hp<=0)s.sc='gameover';
}

function die(s,e){
  const p=s.p,xm=1+gef(p,'xb');
  const xp=Math.floor(e.xp*xm);p.xp+=xp;p.gold+=e.g;s.meta.kills++;
  lg(s,`${e.name}撃破!+${xp}XP+${e.g}G`,COL.tg);
  if(hef(p,'kcd'))for(const sk of p.sk){if(sk.t>0)sk.t=Math.max(0,sk.t-1)}
  s.pt.push({t:'d',x:e.x,y:e.y,col:e.col,life:16,l0:16});
  s.en=s.en.filter(x=>x!==e);if(s.boss===e)s.boss=null;
  clvl(s);
}

function kb(s,e,d){const nx=e.x+d.dx,ny=e.y+d.dy;if(wk(s.map,nx,ny)&&!fe(s,nx,ny)){e.x=nx;e.y=ny}}
function clvl(s){const p=s.p;while(p.xp>=p.xpn){p.xp-=p.xpn;p.lv++;p.xpn=Math.floor(p.xpn*1.4);p.mhp+=8;p.hp=Math.min(p.mhp,p.hp+18);lg(s,`Lv${p.lv}アップ!`,COL.tg);s.lup=true}}

// ===================== SKILL SYSTEM =====================
function tskl(s){
  const p=s.p,cdr=(s.meta.perms.cd||0)+gef(p,'acd')+gef(p,'scd');
  let ffd=false;
  for(const sk of p.sk){
    if(sk.t>0)sk.t--;
    if(sk.t<=0){
      if(p._mv&&hef(p,'fd')&&!ffd){SKL[sk.id].fn(s,sk.lv);SKL[sk.id].fn(s,sk.lv);ffd=true}
      else SKL[sk.id].fn(s,sk.lv);
      sk.t=Math.max(1,SKL[sk.id].cd-cdr);
    }
  }
}
function addSk(s,id){const p=s.p,ex=p.sk.find(sk=>sk.id===id);if(ex){ex.lv=Math.min(SKL[id].max,ex.lv+1);lg(s,`${SKL[id].name} Lv${ex.lv}!`,COL.ty)}else{p.sk.push({id,lv:1,cd:SKL[id].cd,t:SKL[id].cd});lg(s,`${SKL[id].name}習得!`,COL.tg)}}
function mkCh(s){const p=s.p,cls=CLS[s.cls];
  const pool=cls.pool.filter(id=>{const ex=p.sk.find(sk=>sk.id===id);return ex?ex.lv<SKL[id].max:true});
  return sh([...pool]).slice(0,Math.min(3+gef(p,'ec'),pool.length))}
function sfx(s,x,y,r,col){s.pt.push({t:'ring',x,y,r,life:12,l0:12,col})}

// ===================== ENEMY AI =====================
function upEn(s){
  const snap=[...s.en.filter(e=>e.hp>0)];
  for(const e of snap){
    if(!s.en.includes(e)||e.hp<=0)continue;
    if(e.fr>0){e.fr--;continue}
    if(e.stun>0){e.stun--;continue}
    if(e.po>0){const pd=Math.max(1,Math.floor(s.p.atk*0.28));e.hp-=pd;e.po--;
      s.pt.push({t:'n',x:e.x,y:e.y,v:pd,life:14,l0:14,col:'#60e870'});if(e.hp<=0){die(s,e);continue}}
    if(s.turn%e.spd!==0)continue;
    switch(e.ai){case'ch':aiCh(s,e);break;case'ra':aiRa(s,e);break;case'mg':aiMg(s,e);break;case'boss':aiBS(s,e);break}
  }
}
function aiCh(s,e){const p=s.p;d4(e.x,e.y,p.x,p.y)<=1?dpg(s,e.atk,e.name):mvTo(s,e,p.x,p.y)}
function aiRa(s,e){
  const p=s.p,dst=d4(e.x,e.y,p.x,p.y);
  if(dst<=1){const dx=Math.sign(e.x-p.x)||ch([-1,1]),dy=Math.sign(e.y-p.y)||ch([-1,1]);const nx=e.x+dx,ny=e.y+dy;if(wk(s.map,nx,ny)&&!fe(s,nx,ny)){e.x=nx;e.y=ny}}
  else if(dst<=e.rng)s.pj.push({x:e.x,y:e.y,dx:Math.sign(p.x-e.x),dy:Math.sign(p.y-e.y),dmg:e.atk,own:'e',life:14,col:COL.pe})
  else mvTo(s,e,p.x,p.y);
}
function aiMg(s,e){
  const p=s.p,dst=d4(e.x,e.y,p.x,p.y);
  if(dst<=e.rng){
    if(e.cht>=e.chs){const tx=e.chtg?.x??p.x,ty=e.chtg?.y??p.y;e.cht=0;e.chtg=null;
      if(d4(p.x,p.y,tx,ty)<=1)dpg(s,e.atk,`${e.name}の魔法`);else lg(s,'魔法を回避!',COL.tg);
      sfx(s,tx,ty,1.2,'#ee4040')}
    else{e.cht++;e.chtg={x:p.x,y:p.y}}
  }else{e.cht=0;e.chtg=null;mvTo(s,e,p.x,p.y)}
}
function aiBS(s,e){
  const p=s.p,dst=d4(e.x,e.y,p.x,p.y);
  if(e.ph&&e.phi<e.ph.length&&e.hp/e.mhp<=e.ph[e.phi].th){const ph=e.ph[e.phi];e.phi++;lg(s,`${e.name}:${ph.msg}`,COL.tr);ph.fn(e,s)}
  if(dst<=1){dpg(s,e.atk,e.name);if(s.turn%4===0)dpg(s,Math.floor(e.atk*0.8),`${e.name}の強打`)}
  else{mvTo(s,e,p.x,p.y);if(dst<=5&&s.turn%3===0)s.pj.push({x:e.x,y:e.y,dx:Math.sign(p.x-e.x),dy:Math.sign(p.y-e.y),dmg:e.atk,own:'e',life:10,col:e.col})}
}
function mvTo(s,e,tx,ty){
  const dx=tx-e.x,dy=ty-e.y;
  const moves=Math.abs(dx)>=Math.abs(dy)?[{dx:Math.sign(dx),dy:0},{dx:0,dy:Math.sign(dy)}]:[{dx:0,dy:Math.sign(dy)},{dx:Math.sign(dx),dy:0}];
  for(const m of moves){if(!m.dx&&!m.dy)continue;const nx=e.x+m.dx,ny=e.y+m.dy;if(!wk(s.map,nx,ny)||fe(s,nx,ny))continue;if(nx===s.p.x&&ny===s.p.y){dpg(s,e.atk,e.name);return}e.x=nx;e.y=ny;return}
}

// ===================== PROJECTILE / HAZARD =====================
function upPj(s){
  const p=s.p,dead=[];
  for(const pr of s.pj){pr.x+=pr.dx;pr.y+=pr.dy;pr.life--;
    if(pr.life<=0||!wk(s.map,pr.x,pr.y)){dead.push(pr);continue}
    if(pr.own==='p'){const e=fe(s,pr.x,pr.y);if(e){hte(s,e,pr.dmg);lg(s,`弾:${e.name}に命中`,COL.tb);if(!pr.pi)dead.push(pr)}}
    else if(pr.x===p.x&&pr.y===p.y){dpg(s,pr.dmg,'飛び道具');dead.push(pr)}
  }
  s.pj=s.pj.filter(x=>!dead.includes(x));
}
function upHz(s){
  const dead=[];
  for(const h of s.hz){h.dur--;if(h.dur<=0){dead.push(h);continue}
    for(const e of[...s.en.filter(e=>e.hp>0)]){if(d4(h.x,h.y,e.x,e.y)<=h.r&&h.t==='pois'){e.po=3;if(h.dmg>0)dmgE(s,e,h.dmg)}}}
  s.hz=s.hz.filter(x=>!dead.includes(x));
}
function upBf(s){
  const p=s.p;p.bf=p.bf.filter(b=>{if(b.t!==undefined){b.t--;return b.t>0}return true});
  for(const sl of['weapon','armor','acc1','acc2']){const id=p.eq[sl];if(!id)continue;const it=EQ.find(e=>e.id===id);if(it?.ef?.reg&&s.turn%it.ef.reg.t===0){p.hp=Math.min(p.mhp,p.hp+it.ef.reg.v);s.pt.push({t:'n',x:p.x,y:p.y,v:it.ef.reg.v,heal:true,life:18,l0:18,col:COL.tg})}}
}
function upPt(s){s.pt=s.pt.filter(p=>{p.life--;return p.life>0})}

// ===================== TURN PROCESSING =====================
function doTurn(s,act){
  if(s.sc!=='dungeon'||s.lup)return;
  const p=s.p;s.turn++;p._mv=false;
  if(act.t==='move'){
    const nx=p.x+act.dx,ny=p.y+act.dy;
    p.fc={dx:act.dx,dy:act.dy};
    if(!wk(s.map,nx,ny)){s.turn--;return}
    const e=fe(s,nx,ny);
    if(e){
      let atk=Math.floor(p.atk*(1+gef(p,'mel')));
      if(hef(p,'ber')&&p.hp/p.mhp<=0.3)atk=Math.floor(atk*1.5);
      const d=hte(s,e,atk);p.lhid=e.id;
      if(hef(p,'phi')&&Math.random()<0.4&&e.hp>0){e.po=3;lg(s,'毒付与!',COL.tg)}
      lg(s,`${e.name}に${d}ダメ`,COL.tr);
    }else{
      p.x=nx;p.y=ny;p._mv=true;
      const tile=s.map.tiles[ny][nx];
      if(tile===2&&s.en.length===0)nxfl(s);
      else if(tile===2)lg(s,'敵を全滅すると進める',COL.td);
      else if(tile===3&&!s.map.co)opCh(s);
    }
  }else if(act.t==='wait'){lg(s,'待機',COL.td)}
  if(s.sc==='gameover')return;
  tskl(s);upEn(s);upPj(s);upHz(s);upBf(s);upPt(s);upCam(s);
  if(s.fl>=4&&s.en.length===0){s.sc='victory';return}
  if(s.lup){s.lup=false;s.lch=mkCh(s);s.sc='levelup'}
}

function nxfl(s){
  s.fl++;s.en=[];s.pj=[];s.hz=[];s.boss=null;
  s.map=genMap();
  if(s.fl>3){const bid=s.dng==='dungeon_a'?'vw':'sc';spawnBoss(s,bid);const r=s.map.rooms[0];s.p.x=r.x+1;s.p.y=r.y+1;upCam(s);lg(s,'ボスフロア! 逃げ場なし',COL.tr);return}
  spawnEn(s);const r=s.map.rooms[0];s.p.x=r.x+1;s.p.y=r.y+1;upCam(s);lg(s,`フロア${s.fl}へ`,COL.tg);
}

function opCh(s){
  s.map.co=true;s.map.tiles[s.p.y][s.p.x]=1;
  const pool=EQ.filter(e=>e.r<=2),wts=pool.map(e=>({e,w:[4,2,1][e.r]}));
  let rv=Math.random()*wts.reduce((a,b)=>a+b.w,0),item=pool[pool.length-1];
  for(const w of wts){rv-=w.w;if(rv<=0){item=w.e;break}}
  s.ipick=item;s.sc='item_pickup';
}

function upCam(s){const p=s.p;s.cam.x=cl(p.x-Math.floor(VW/2),0,MW-VW);s.cam.y=cl(p.y-Math.floor(VH/2),0,MH-VH)}
function lg(s,msg,col=COL.tx){s.log.unshift({msg,col});if(s.log.length>60)s.log.pop()}

// ===================== CANVAS SETUP =====================
const cv=document.getElementById('c');const ctx=cv.getContext('2d');
cv.width=CW;cv.height=CH;

// ===================== RENDERING =====================
function draw(s){
  ctx.clearRect(0,0,CW,CH);ctx.fillStyle=COL.bg;ctx.fillRect(0,0,CW,CH);
  const f={base:dBase,dungeon:dDng,levelup:()=>{dDng(s);dLvUp(s)},item_pickup:()=>{dDng(s);dItm(s)},gameover:dGO,victory:dVic};
  (f[s.sc]||dBase)(s);
}

// ---- DUNGEON ----
function dDng(s){dMap(s);dHz(s);dEnts(s);dPjs(s);dPts(s);dSB(s)}

function dMap(s){
  const map=s.map,cam=s.cam,p=s.p;
  ctx.fillStyle='#020210';ctx.fillRect(0,0,GW,GH);
  // Danger tiles
  const dn=new Set();
  for(const e of s.en.filter(e=>e.hp>0)){
    if(e.ai==='mg'&&e.chtg)for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)dn.add(`${e.chtg.x+dx},${e.chtg.y+dy}`);
    if(e.ai==='ra'&&d4(e.x,e.y,p.x,p.y)<=e.rng){const dx=Math.sign(p.x-e.x),dy=Math.sign(p.y-e.y);for(let r=1;r<=e.rng;r++)dn.add(`${e.x+dx*r},${e.y+dy*r}`)}
  }
  for(let vy=0;vy<VH;vy++)for(let vx=0;vx<VW;vx++){
    const mx=cam.x+vx,my=cam.y+vy;if(mx<0||my<0||mx>=MW||my>=MH)continue;
    const tile=s.map.tiles[my][mx],px=vx*TS,py=vy*TS;
    if(tile===0){ctx.fillStyle=(mx+my)%2?COL.wa:COL.wa2;ctx.fillRect(px,py,TS,TS);ctx.fillStyle='rgba(60,100,200,0.1)';ctx.fillRect(px,py,TS,3)}
    else{ctx.fillStyle=(mx+my)%2?COL.fl:COL.fl2;ctx.fillRect(px,py,TS,TS);
      if(tile===2){ctx.font=`${TS-5}px serif`;ctx.textAlign='center';ctx.fillStyle='#50e88a';ctx.fillText('▼',px+TS/2,py+TS-2);ctx.textAlign='left'}
      if(tile===3&&!s.map.co){ctx.font=`${TS-8}px serif`;ctx.textAlign='center';ctx.fillStyle=COL.ty;ctx.fillText('📦',px+TS/2,py+TS-3);ctx.textAlign='left'}
    }
    if(dn.has(`${mx},${my}`)){ctx.fillStyle=COL.dan;ctx.fillRect(px,py,TS,TS)}
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=0.5;ctx.strokeRect(px,py,TS,TS);
  }
}

function dHz(s){const cam=s.cam;for(const h of s.hz)for(let dy=-h.r;dy<=h.r;dy++)for(let dx=-h.r;dx<=h.r;dx++){
  if(d4(0,0,dx,dy)>h.r)continue;const vx=h.x+dx-cam.x,vy=h.y+dy-cam.y;
  if(vx<0||vy<0||vx>=VW||vy>=VH)continue;ctx.fillStyle=h.col+'55';ctx.fillRect(vx*TS,vy*TS,TS,TS)}}

function dEnts(s){
  const cam=s.cam,p=s.p;
  for(const e of s.en.filter(e=>e.hp>0)){
    const vx=e.x-cam.x,vy=e.y-cam.y;if(vx<0||vy<0||vx>=VW||vy>=VH)continue;
    const px=vx*TS,py=vy*TS;
    if(e.fr>0){ctx.fillStyle='rgba(80,180,255,0.35)';ctx.fillRect(px,py,TS,TS)}
    ctx.fillStyle=e.elite||e.id==='boss'?'#110a00':'#100c14';rrect(px+2,py+2,TS-4,TS-4,4);ctx.fill();
    ctx.strokeStyle=e.col;ctx.lineWidth=e.id==='boss'?3:e.elite?2:1;ctx.stroke();
    ctx.font=`${e.id==='boss'?30:24}px serif`;ctx.textAlign='center';ctx.fillStyle=e.col;
    ctx.fillText(e.sym,px+TS/2,py+TS/2+8);ctx.textAlign='left';
    const hr=e.hp/e.mhp;ctx.fillStyle='#1a1a1a';ctx.fillRect(px+2,py,TS-4,3);
    ctx.fillStyle=hr>0.5?'#3c9':hr>0.25?'#fc0':'#f33';ctx.fillRect(px+2,py,Math.floor((TS-4)*hr),3);
    if(e.fr>0)xi('❄',px+TS-16,py+2,13);if(e.stun>0)xi('💫',px+TS-30,py+2,13);if(e.po>0)xi('☠',px+TS-44,py+2,13);
    if(e.cht>0){ctx.font='12px Courier New';ctx.fillStyle='rgba(255,60,40,0.85)';ctx.textAlign='center';ctx.fillText(`⚡${e.chs-e.cht+1}`,px+TS/2,py+TS-2);ctx.textAlign='left'}
  }
  const pvx=p.x-cam.x,pvy=p.y-cam.y;
  if(pvx>=0&&pvy>=0&&pvx<VW&&pvy<VH){
    const cls=CLS[s.cls],px2=pvx*TS,py2=pvy*TS;
    const g=ctx.createRadialGradient(px2+TS/2,py2+TS/2,2,px2+TS/2,py2+TS/2,TS*0.8);
    g.addColorStop(0,cls.col+'40');g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(px2-4,py2-4,TS+8,TS+8);
    ctx.fillStyle='#120e00';rrect(px2+2,py2+2,TS-4,TS-4,5);ctx.fill();ctx.strokeStyle=cls.col;ctx.lineWidth=2;ctx.stroke();
    ctx.font='28px serif';ctx.textAlign='center';ctx.fillStyle=cls.col;ctx.fillText(cls.icon,px2+TS/2,py2+TS/2+8);ctx.textAlign='left';
    const bi={cry:'⚡',iron:'🪨',ms:'🔮',ctr:'↩',aecho:'∞'};
    p.bf.forEach((b,i)=>{if(bi[b.id])xi(bi[b.id],px2+i*16,py2,13)});
  }
}

function dPjs(s){const cam=s.cam;for(const pr of s.pj){
  const vx=pr.x-cam.x,vy=pr.y-cam.y;if(vx<0||vy<0||vx>=VW||vy>=VH)continue;
  ctx.fillStyle=pr.col;ctx.beginPath();ctx.arc(vx*TS+TS/2,vy*TS+TS/2,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=pr.col+'40';ctx.beginPath();ctx.arc((vx-pr.dx)*TS+TS/2,(vy-pr.dy)*TS+TS/2,3,0,Math.PI*2);ctx.fill();
}}

function dPts(s){
  const cam=s.cam;
  for(const pt of s.pt){
    const vx=pt.x-cam.x,vy=pt.y-cam.y,a=pt.life/pt.l0;
    const ax=Math.floor(a*255).toString(16).padStart(2,'0');
    if(pt.t==='n'){
      ctx.font=`bold ${pt.crit?18:14}px Courier New`;ctx.fillStyle=pt.col+ax;ctx.textAlign='center';
      ctx.fillText(pt.heal?`+${pt.v}`:pt.v,vx*TS+TS/2,vy*TS+TS/2-(1-a)*28);ctx.textAlign='left';
    }else if(pt.t==='ring'){
      if(vx>-pt.r-1&&vy>-pt.r-1&&vx<VW+pt.r&&vy<VH+pt.r){
        ctx.strokeStyle=pt.col+Math.floor(a*180).toString(16).padStart(2,'0');ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(vx*TS+TS/2,vy*TS+TS/2,pt.r*TS*(2-a*1.4),0,Math.PI*2);ctx.stroke();}
    }else if(pt.t==='bolt'){
      ctx.strokeStyle=pt.col+ax;ctx.lineWidth=2;ctx.beginPath();
      ctx.moveTo((pt.x1-cam.x)*TS+TS/2,(pt.y1-cam.y)*TS+TS/2);
      ctx.lineTo((pt.x2-cam.x)*TS+TS/2,(pt.y2-cam.y)*TS+TS/2);ctx.stroke();
    }else if(pt.t==='d'){
      if(vx>=0&&vy>=0&&vx<VW&&vy<VH){
        ctx.fillStyle=pt.col+ax;
        for(let i=0;i<6;i++){const ang=i/6*Math.PI*2,r=(1-a)*TS*0.5;ctx.beginPath();ctx.arc(vx*TS+TS/2+Math.cos(ang)*r,vy*TS+TS/2+Math.sin(ang)*r,2,0,Math.PI*2);ctx.fill()}
      }
    }
  }
}

function dSB(s){
  const p=s.p,sx=GW,sw=UW;
  ctx.fillStyle=COL.sb;ctx.fillRect(sx,0,sw,GH);
  ctx.strokeStyle=COL.br;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,GH);ctx.stroke();
  const lx=sx+8,fw=sw-16;let y=10;
  const cls=CLS[s.cls];
  ctx.font='bold 16px Courier New';ctx.fillStyle=cls.col;ctx.fillText(`${cls.icon} ${cls.name}  Lv.${p.lv}`,lx,y+=18);
  y+=6;ctx.font='13px Courier New';ctx.fillStyle=COL.td;ctx.fillText(`HP ${p.hp}/${p.mhp}`,lx,y+=16);
  bar(lx,y+=3,fw,9,p.hp/p.mhp,COL.hp,'#1a0808');
  ctx.fillStyle=COL.td;ctx.fillText(`XP ${p.xp}/${p.xpn}`,lx,y+=18);
  bar(lx,y+=3,fw,7,p.xp/p.xpn,COL.xp,'#071a10');
  y+=10;ctx.font='13px Courier New';ctx.fillStyle=COL.tx;
  ctx.fillText(`⚔ ${p.atk}  🛡 ${p.def}  💰 ${p.gold}`,lx,y+=16);
  ctx.fillStyle=COL.td;ctx.fillText(`フロア ${s.fl}/4  Turn ${s.turn}  敵 ${s.en.length}`,lx,y+=16);
  y+=6;divl(lx,y,fw);
  if(p.bf.length){ctx.font='bold 12px Courier New';ctx.fillStyle=COL.tb;ctx.fillText('バフ',lx,y+=16);
    const bn={cry:'⚡ウォークライ',iron:'🪨アイアンスキン',ms:'🔮マナシールド',ctr:'↩カウンター',aecho:'∞エコー'};
    for(const b of p.bf.slice(0,4)){ctx.font='12px Courier New';ctx.fillStyle='#80d8ff';ctx.fillText(`${bn[b.id]||b.id}${b.t!==undefined?` (${b.t}T)`:''}`,lx,y+=15)}
    y+=4;divl(lx,y,fw);}
  ctx.font='bold 13px Courier New';ctx.fillStyle=COL.cd||'#7040c0';ctx.fillText('スキル [オート]',lx,y+=16);
  for(const sk of p.sk){
    const def=SKL[sk.id],rdy=sk.t<=0,by2=y+=6;
    pnl(lx,by2,fw,32,rdy?'#141428':'#0d0d1e',rdy?'#7040c0':'#2a2a4a');
    ctx.font='18px serif';ctx.fillStyle=rdy?'#c080ff':COL.td;ctx.fillText(def.icon,lx+5,by2+23);
    ctx.font='12px Courier New';ctx.fillStyle=rdy?COL.tx:COL.td;ctx.fillText(`${def.name} Lv${sk.lv}`,lx+28,by2+13);
    bar(lx+28,by2+18,fw-36,5,sk.t<=0?1:1-sk.t/sk.cd,'#7040c0','#1a1a30');
    ctx.font='11px Courier New';ctx.fillStyle=rdy?'#c080ff':'#5a5a8a';ctx.fillText(rdy?'READY':`${sk.t}T`,lx+fw-40,by2+13);
    y+=32;
  }
  y+=4;divl(lx,y,fw);
  ctx.font='bold 12px Courier New';ctx.fillStyle=COL.td;ctx.fillText('── ログ ──',lx,y+=16);
  for(const e of s.log.slice(0,8)){ctx.font='11px Courier New';ctx.fillStyle=e.col;ctx.fillText(e.msg.substring(0,32),lx,y+=14)}
  // Bottom bar
  ctx.fillStyle='#08081c';ctx.fillRect(0,GH,CW,CH-GH);
  ctx.font='13px Courier New';ctx.fillStyle=COL.td;
  ctx.fillText('[WASD/矢印]移動  [Space]待機  [E]宝箱を開ける  [Esc]拠点に戻る',10,GH+28);
}

// ---- OVERLAYS ----
function dLvUp(s){
  ctx.fillStyle='rgba(0,0,18,0.88)';ctx.fillRect(0,0,CW,CH);
  if(!s.lch)return;
  const pw=600,ph=52+s.lch.length*100,px=(CW-pw)/2,py=(CH-ph)/2;
  pnl(px,py,pw,ph,'#0d0d28','#7040c0');
  ctx.font='bold 24px Courier New';ctx.fillStyle='#c080ff';ctx.textAlign='center';
  ctx.fillText(`レベルアップ! Lv.${s.p.lv}`,CW/2,py+34);ctx.textAlign='left';
  s.lch.forEach((id,i)=>{
    const def=SKL[id],ex=s.p.sk.find(sk=>sk.id===id),lv=ex?ex.lv+1:1;
    const by2=py+52+i*96,bw=pw-28,bh=90,hov=s.lhov===i;
    pnl(px+14,by2,bw,bh,hov?'#1a1a40':'#111130',hov?'#9020b0':'#3a3a6a');
    ctx.font='bold 16px Courier New';ctx.fillStyle='#7040c0';ctx.fillText(`[${i+1}]`,px+24,by2+26);
    ctx.font='24px serif';ctx.fillStyle=ex?COL.ty:'#c080ff';ctx.fillText(def.icon,px+56,by2+30);
    ctx.font='bold 16px Courier New';ctx.fillStyle=COL.tx;ctx.fillText(`${def.name} ${ex?`Lv${lv}`:'NEW'}`,px+86,by2+24);
    ctx.font='13px Courier New';ctx.fillStyle=COL.td;ctx.fillText(def.desc,px+86,by2+44);
    ctx.font='12px Courier New';ctx.fillStyle='#5a5a9a';ctx.fillText(`CD:${def.cd}T  最大Lv:${def.max}`,px+86,by2+62);
  });
}

function dItm(s){
  const it=s.ipick;if(!it)return;
  ctx.fillStyle='rgba(0,0,18,0.82)';ctx.fillRect(0,0,CW,CH);
  const pw=460,ph=230,px=(CW-pw)/2,py=(CH-ph)/2;
  pnl(px,py,pw,ph,'#0d0d28',COL.rar[it.r]);
  ctx.font='bold 20px Courier New';ctx.fillStyle=COL.rar[it.r];ctx.textAlign='center';ctx.fillText(it.n,CW/2,py+38);
  ctx.font='13px Courier New';ctx.fillStyle=COL.td;ctx.fillText(RN[it.r],CW/2,py+58);
  ctx.font='15px Courier New';ctx.fillStyle=COL.tx;ctx.fillText(it.desc,CW/2,py+90);
  const ss=[];if(it.atk)ss.push(`ATK+${it.atk}`);if(it.def)ss.push(`DEF+${it.def}`);if(it.hp)ss.push(`HP+${it.hp}`);
  ctx.font='14px Courier New';ctx.fillStyle=COL.tb;ctx.fillText(ss.join('  '),CW/2,py+114);
  const sl=it.sl==='acc'?'acc1':it.sl,cur=s.p.eq[sl],ci=cur?EQ.find(e=>e.id===cur):null;
  ctx.font='13px Courier New';ctx.fillStyle=COL.td;ctx.fillText(`現在: ${ci?ci.n:'(空)'}`,CW/2,py+138);
  pnl(px+20,py+158,190,44,'#0d1a30',COL.tg);ctx.font='15px Courier New';ctx.fillStyle=COL.tg;ctx.fillText('[E] 装備する',CW/2-72,py+186);
  pnl(px+240,py+158,190,44,'#1a0d0d',COL.tr);ctx.fillStyle=COL.tr;ctx.fillText('[Esc] 捨てる',CW/2+32,py+186);ctx.textAlign='left';
}

function dGO(s){
  ctx.fillStyle='#050010';ctx.fillRect(0,0,CW,CH);
  ctx.font='bold 60px Courier New';ctx.fillStyle='#ff1744';ctx.textAlign='center';ctx.fillText('GAME OVER',CW/2,CH/2-50);
  ctx.font='18px Courier New';ctx.fillStyle=COL.td;ctx.fillText(`${CLS[s.cls].name}  フロア${s.fl}  ${s.turn}ターン`,CW/2,CH/2+10);
  ctx.font='17px Courier New';ctx.fillStyle=COL.tg;ctx.fillText('[Enter] 拠点に戻る',CW/2,CH/2+70);ctx.textAlign='left';
}

function dVic(s){
  ctx.fillStyle='#050510';ctx.fillRect(0,0,CW,CH);
  ctx.font='bold 58px Courier New';ctx.fillStyle=COL.ty;ctx.textAlign='center';ctx.fillText('VICTORY!',CW/2,CH/2-50);
  ctx.font='18px Courier New';ctx.fillStyle=COL.tx;ctx.fillText(`${CLS[s.cls].name}  全フロア制覇！  ${s.turn}ターン`,CW/2,CH/2+10);
  ctx.font='17px Courier New';ctx.fillStyle=COL.tg;ctx.fillText('[Enter] 拠点に戻る',CW/2,CH/2+70);ctx.textAlign='left';
}

// ---- UI HELPERS ----
function bar(x,y,w,h,r,fg,bg){ctx.fillStyle=bg;ctx.fillRect(x,y,w,h);ctx.fillStyle=fg;ctx.fillRect(x,y,Math.floor(w*Math.max(0,Math.min(1,r))),h)}
function xi(ic,x,y,sz){ctx.font=`${sz}px serif`;ctx.fillText(ic,x,y+sz)}
function rrect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}
function pnl(x,y,w,h,bg,bc){ctx.fillStyle=bg;rrect(x,y,w,h,4);ctx.fill();ctx.strokeStyle=bc;ctx.lineWidth=1;ctx.stroke()}
function lbl(t,x,y){ctx.font='bold 14px Courier New';ctx.fillStyle=COL.td;ctx.fillText('─── '+t+' ───',x,y)}
function divl(x,y,w){ctx.strokeStyle=COL.br;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.stroke()}
function wj(text,x,y,mw,lh){let ln='',ly=y;for(const c of text){const t=ln+c;if(ctx.measureText(t).width>mw&&ln){ctx.fillText(ln,x,ly);ln=c;ly+=lh}else ln=t}if(ln)ctx.fillText(ln,x,ly)}

// ===================== INPUT =====================
const MK={'ArrowUp':{dx:0,dy:-1},'w':{dx:0,dy:-1},'W':{dx:0,dy:-1},'ArrowDown':{dx:0,dy:1},'s':{dx:0,dy:1},'S':{dx:0,dy:1},'ArrowLeft':{dx:-1,dy:0},'a':{dx:-1,dy:0},'A':{dx:-1,dy:0},'ArrowRight':{dx:1,dy:0},'d':{dx:1,dy:0},'D':{dx:1,dy:0}};

document.addEventListener('keydown',e=>{
  if(!G)return;e.preventDefault();const k=e.key,s=G;
  if(s.sc==='base'){if(k==='Enter'&&s.sc2&&s.dng2)startRun(s)}
  else if(s.sc==='dungeon'){
    if(MK[k])doTurn(s,{t:'move',...MK[k]});
    else if(k===' ')doTurn(s,{t:'wait'});
    else if(k==='e'||k==='E')doTurn(s,{t:'wait'});
    else if(k==='Escape')goBase(s);
  }else if(s.sc==='levelup'){
    const n=parseInt(k);if(n>=1&&s.lch&&n<=s.lch.length){addSk(s,s.lch[n-1]);s.lch=null;s.lhov=-1;s.sc='dungeon'}
  }else if(s.sc==='item_pickup'){
    if(k==='e'||k==='E')eqItem(s);
    else if(k==='Escape'){lg(s,`${s.ipick.n}を捨てた`,COL.td);s.ipick=null;s.sc='dungeon'}
  }else if(s.sc==='gameover'||s.sc==='victory'){if(k==='Enter')goBase(s)}
});

cv.addEventListener('click',e=>{
  if(!G)return;const s=G;const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
  if(s.sc==='base'){
    Object.keys(CLS).forEach((id,i)=>{const bx=46+i*310,by=146;if(mx>=bx&&mx<bx+296&&my>=by&&my<by+126)s.sc2=id});
    ['dungeon_a','dungeon_b'].forEach((id,i)=>{const bx=46+i*310,by=316;if(mx>=bx&&mx<bx+296&&my>=by&&my<by+70)s.dng2=id});
    ['casual','roguelite','hardcore'].forEach((id,i)=>{const bx=46+i*214,by=430;if(mx>=bx&&mx<bx+200&&my>=by&&my<by+52)s.mode2=id});
    if(mx>=CW/2-130&&mx<=CW/2+130&&my>=CH-80&&my<=CH-30&&s.sc2&&s.dng2)startRun(s);
    PERM.forEach((u,i)=>{const bx=700,by=406+i*38;if(mx>=bx&&mx<bx+320&&my>=by&&my<by+32){const lv=s.meta.perms[u.id]||0,cost=u.cost*(lv+1);if(lv<u.max&&s.meta.gold>=cost){s.meta.gold-=cost;s.meta.perms[u.id]=(lv+1);sv(s.meta)}}});
  }else if(s.sc==='item_pickup'){
    if(mx>=CW/2-180&&mx<CW/2+4)eqItem(s);
    else if(mx>=CW/2+4&&mx<CW/2+180){lg(s,`${s.ipick.n}を捨てた`,COL.td);s.ipick=null;s.sc='dungeon'}
  }
});

cv.addEventListener('mousemove',e=>{
  if(!G||G.sc!=='levelup'||!G.lch)return;
  const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
  const pw=600,ph=52+G.lch.length*100,px=(CW-pw)/2,py=(CH-ph)/2;G.lhov=-1;
  G.lch.forEach((_,i)=>{const by2=py+52+i*96;if(mx>=px+14&&mx<px+14+pw-28&&my>=by2&&my<by2+90)G.lhov=i});
});

// Click on level-up choices
cv.addEventListener('click',e=>{
  if(!G||G.sc!=='levelup'||!G.lch)return;
  const rect=cv.getBoundingClientRect();const mx=(e.clientX-rect.left)*(CW/rect.width),my=(e.clientY-rect.top)*(CH/rect.height);
  const pw=600,ph=52+G.lch.length*100,px=(CW-pw)/2,py=(CH-ph)/2;
  G.lch.forEach((id,i)=>{const by2=py+52+i*96;if(mx>=px+14&&mx<px+14+pw-28&&my>=by2&&my<by2+90){addSk(G,id);G.lch=null;G.lhov=-1;G.sc='dungeon'}});
},{capture:true});

// ===================== GAME MANAGEMENT =====================
function startRun(s){
  const meta=s.meta;meta.runs++;sv(meta);
  const run=newRun(meta,s.sc2,s.dng2);
  run.mode=s.mode2||'roguelite';
  // Apply equipment bonuses to base stats
  for(const sl of['weapon','armor','acc1','acc2']){const id=run.p.eq[sl];if(!id)continue;const it=EQ.find(e=>e.id===id);if(it){run.p.atk+=it.atk||0;run.p.def+=it.def||0;run.p.mhp+=it.hp||0;run.p.hp+=it.hp||0}}
  run.map=genMap();spawnEn(run);
  const r=run.map.rooms[0];run.p.x=r.x+1;run.p.y=r.y+1;upCam(run);
  lg(run,`${CLS[s.sc2].name}でダンジョンへ!`,COL.tg);lg(run,'WASD:移動 Space:待機 Esc:拠点',COL.td);
  G=run;
}

function eqItem(s){
  const it=s.ipick,sl=it.sl==='acc'?'acc1':it.sl,old=s.p.eq[sl];
  if(old){const oi=EQ.find(e=>e.id===old);if(oi){s.p.atk-=oi.atk||0;s.p.def-=oi.def||0;s.p.mhp-=oi.hp||0;s.p.hp=Math.min(s.p.hp,s.p.mhp)}}
  s.p.atk+=it.atk||0;s.p.def+=it.def||0;s.p.mhp+=it.hp||0;s.p.hp=Math.min(s.p.hp+(it.hp||0),s.p.mhp);
  s.p.eq[sl]=it.id;lg(s,`${it.n}を装備!`,COL.rar[it.r]);s.ipick=null;s.sc='dungeon';
}

function goBase(s){
  const meta=s.meta||nm();
  if(s.p&&s.p.gold){const mode=s.mode||'roguelite',keep=mode==='casual'?s.p.gold:mode==='roguelite'?Math.floor(s.p.gold*0.7):Math.floor(s.p.gold*0.3);meta.gold+=keep}
  if(s.p?.eq)Object.entries(s.p.eq).forEach(([sl,id])=>{if(id)meta.eq[sl]=id});
  sv(meta);G={sc:'base',meta,sc2:s.cls||s.sc2||'vanguard',dng2:s.dng||s.dng2||'dungeon_a',mode2:s.mode||s.mode2||'roguelite'};
}

// ===================== MAIN LOOP =====================
function loop(t){if(G)draw(G);requestAnimationFrame(loop)}

function init(){G={sc:'base',meta:ld()||nm(),sc2:'vanguard',dng2:'dungeon_a',mode2:'roguelite'};requestAnimationFrame(loop)}
init();
</script>
